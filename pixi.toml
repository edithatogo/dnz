[project]
name = "dnz-integration"
version = "0.1.0"
description = "DigitalNZ API integration in Rust"
authors = ["Antigravity"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]

[dependencies]
rust = ">=1.75"
cargo-dist = ">=0.11.0"
cargo-mutants = ">=24.0.0"
cargo-tarpaulin = ">=0.27.0"
openssl = ">=3.0"
pkg-config = ">=0.29"

[tasks]
build = "cargo build"
test = "cargo test"
fmt = "cargo fmt --all"
clippy = "cargo clippy --all-targets -- -D warnings"
coverage = "cargo tarpaulin --verbose --workspace --all-features --out Xml --fail-under 90"
coverage-html = "cargo tarpaulin --verbose --workspace --all-features --out Html"
mutants = "cargo mutants"
audit = "cargo audit"
doctor = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/workspace-doctor.ps1 -Strict"
install-hooks = "git config core.hooksPath .githooks"
tmdl-docs = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tmdl-data-dictionary.ps1"
tmdl-validate = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/validate-tmdl.ps1"
package-metadata = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/validate-package-metadata.ps1 -AllowDirty"
verify = { depends_on = ["fmt", "clippy", "test", "coverage", "audit", "doctor"] }
dry-run-cargo = "cargo publish -p dnz-core --dry-run && cargo publish -p dnz-cli --dry-run && cargo publish -p dnz-mcp --dry-run"
dry-run-maturin = "maturin build --release --manifest-path crates/dnz-python/Cargo.toml"
