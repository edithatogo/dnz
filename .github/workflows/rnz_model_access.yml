name: RNZ Gated Model Access Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rnz-zero-cost-production
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce public repository and zero-cost policy
        env:
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          set -euo pipefail
          test "$REPOSITORY_VISIBILITY" = "public"
          python scripts/rnz_archive.py policy

      - name: Verify token can read required public and gated models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "huggingface-hub==0.36.2"
          python - <<'PY'
          import os
          from huggingface_hub import hf_hub_download

          token = os.environ["HF_TOKEN"]
          checks = (
              ("mobiuslabsgmbh/faster-whisper-large-v3-turbo", "config.json"),
              ("pyannote/speaker-diarization-community-1", "config.yaml"),
          )
          for repo_id, filename in checks:
              hf_hub_download(repo_id, filename=filename, token=token)
              print(f"access confirmed: {repo_id}/{filename}")
          PY
