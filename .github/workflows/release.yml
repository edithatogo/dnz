name: CD Release Pipeline

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: dnz-linux-x86_64
            mcp_asset_name: dnz-mcp-linux-x86_64
          - os: windows-latest
            asset_name: dnz-windows-x86_64.exe
            mcp_asset_name: dnz-mcp-windows-x86_64.exe
          - os: macos-latest
            asset_name: dnz-macos-x86_64
            mcp_asset_name: dnz-mcp-macos-x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2

      - name: Compile Release Binaries
        run: cargo build --release -p dnz-cli -p dnz-mcp

      - name: Rename Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/release/dnz-cli.exe target/release/${{ matrix.asset_name }}
            mv target/release/dnz-mcp.exe target/release/${{ matrix.mcp_asset_name }}
          else
            mv target/release/dnz-cli target/release/${{ matrix.asset_name }}
            mv target/release/dnz-mcp target/release/${{ matrix.mcp_asset_name }}
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/${{ matrix.asset_name }}
            target/release/${{ matrix.mcp_asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cargo:
    name: Package crates.io dry-runs
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2

      - name: Validate crates.io secret mapping
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is available to the release workflow."
          else
            echo "CARGO_REGISTRY_TOKEN is not configured or unavailable in this context."
          fi

      - name: Dry-run Cargo package publication
        shell: pwsh
        run: ./scripts/verify-cargo-publish-dryruns.ps1

  publish-pypi:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Maturin
        run: pip install maturin twine

      - name: Build Python Wheel
        run: maturin build --release --manifest-path crates/dnz-python/Cargo.toml

      - name: Check Python Wheel Metadata
        run: python -m twine check target/wheels/*

      - name: Validate PyPI secret mapping
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          if [ -n "$MATURIN_PYPI_TOKEN" ]; then
            echo "PYPI_API_TOKEN is available to the release workflow."
          else
            echo "PYPI_API_TOKEN is not configured or unavailable in this context."
          fi
